####################################
# APPLICATION
####################################
spring.application.name=integration-engine

# Perfil ativo padrão. Sobrescrever com: -Dspring.profiles.active=hml|prod
spring.profiles.active=local

####################################
# SERVER
####################################
server.port=8080

####################################
# MULTIPART
####################################
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
server.tomcat.max-swallow-size=-1

####################################
# CORS (fallback; sobrescrever em cada perfil)
####################################
app.cors.allowed-origins=*

####################################
# DOWNLOAD
####################################
# URL base da API para construção de links absolutos de download.
# Sobrescrever em cada perfil com a URL pública real da API.
# Não incluir barra final.
app.base-url=http://localhost:8080

# Diretório onde os relatórios gerados são salvos.
# Pode ser relativo ao diretório de trabalho da JVM ou absoluto.
# Em containers, configurar via REPORT_OUTPUT_DIR para um volume persistente.
app.report.output-dir=output

# Arquivo JSON de histórico de importações.
# Em containers, configurar via HISTORICO_ARQUIVO para um volume persistente.
app.historico.arquivo=data/historico.json

####################################
# CSV
####################################
# Charset para leitura do CSV. Alterar para ISO-8859-1 ou WINDOWS-1252
# se o sistema de RH exportar com encoding Latin.
buni.csv.charset=UTF-8

spring.application.name=integration-engine

################################
# ENVIRONMENT
################################
buni.ambiente=HML

################################
# SERVER
################################
server.port=8080

spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
server.tomcat.max-swallow-size=-1

################################
# CSV
################################
buni.csv.path=input/cliente_teste.csv

# Charset para leitura do CSV. Alterar para ISO-8859-1 ou WINDOWS-1252
# se o sistema de RH exportar com encoding Latin.
buni.csv.charset=UTF-8

################################
# AUTH
################################
buni.auth.url=https://buncghml.funcao.digital/API/FIApiAutClientePF/oauth/token

# Credenciais lidas de variáveis de ambiente.
# Defina BUNI_CLIENT_ID, BUNI_CLIENT_SECRET, BUNI_USERNAME, BUNI_PASSWORD antes de iniciar a aplicação.
# Os valores padrão abaixo são apenas para uso local/homologação — não versionar credenciais reais.
buni.auth.client-id=${BUNI_CLIENT_ID:955000}
buni.auth.client-secret=${BUNI_CLIENT_SECRET:0000146828BAA0D2DC78FA4FA69E0CE586CB1E2D87}
buni.auth.grant-type=filicenca
buni.auth.username=${BUNI_USERNAME:USR_API}
buni.auth.password=${BUNI_PASSWORD:Buni@2026}

################################
# CLIENTE API
################################

# Endpoint de inclusão
buni.cliente.inclusao.url=https://buncghml.funcao.digital/API/FIApiAutClientePF/ClientePF/ClientePF_IncluirCliente

# Endpoint de consulta por CPF
# TipoConsulta: 0 = Cliente, 1 = Proponente
buni.cliente.consulta-cpf.url=https://buncghml.funcao.digital/API/FIApiAutClientePF/ClientePF/ClientePorCPF

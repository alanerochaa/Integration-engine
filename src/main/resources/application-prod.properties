####################################
# APPLICATION
####################################
buni.ambiente=PROD

####################################
# CLIENTES - Endpoints
####################################
# Substituir pela URL base de producao quando disponivel
buni.cliente.base-url=${BUNI_CLIENTE_BASE_URL}
buni.cliente.endpoint.incluir=/ClientePF/ClientePF_IncluirCliente
buni.cliente.endpoint.consulta=/ClientePF/ClientePorCPF

# URLs completas compostas a partir de base-url + endpoint (usadas pelos connectors)
buni.cliente.inclusao.url=${buni.cliente.base-url}${buni.cliente.endpoint.incluir}
buni.cliente.consulta-cpf.url=${buni.cliente.base-url}${buni.cliente.endpoint.consulta}

####################################
# CLIENTES - Autenticacao
####################################
# Em produção todas as credenciais devem vir de variavies de ambiente - sem valores padrao
buni.cliente.auth.url=${buni.cliente.base-url}/oauth/token
buni.cliente.auth.client-id=${BUNI_CLIENT_ID}
buni.cliente.auth.client-secret=${BUNI_CLIENT_SECRET}
buni.cliente.auth.grant-type=filicenca
buni.cliente.auth.username=${BUNI_USERNAME}
buni.cliente.auth.password=${BUNI_PASSWORD}

####################################
# Funcionarios - Endpoints
####################################
# Substituir pela URL base de produção quando dispovivel
buni.funcionario.base-url=${BUNI_FUNC_BASE_URL}
buni.funcionario.endpoint.cadastrar=/CadastroFuncionario/CadastrarFuncionarioEXT

####################################
# Funcionarios - Autenticação
####################################
buni.funcionario.auth.url=${buni.funcionario.base-url}/oauth/token
buni.funcionario.auth.client-id=${FUNC_CLIENT_ID}
buni.funcionario.auth.client-secret=${FUNC_CLIENT_SECRET}
buni.funcionario.auth.grant-type=filicenca
buni.funcionario.auth.username=${FUNC_USERNAME}
buni.funcionario.auth.password=${FUNC_PASSWORD}
